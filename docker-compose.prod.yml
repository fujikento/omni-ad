name: omni-ad-prod

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: omni_ad
      POSTGRES_USER: omni_ad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni_ad"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql://omni_ad:${POSTGRES_PASSWORD}@postgres:5432/omni_ad
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://omni-ad-deploy.vercel.app}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:-https://omni-ad-deploy.vercel.app}
      META_CLIENT_ID: ${META_CLIENT_ID}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN}
      TIKTOK_APP_ID: ${TIKTOK_APP_ID}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
      LINE_YAHOO_CLIENT_ID: ${LINE_YAHOO_CLIENT_ID}
      LINE_YAHOO_CLIENT_SECRET: ${LINE_YAHOO_CLIENT_SECRET}
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/trpc}
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql://omni_ad:${POSTGRES_PASSWORD}@postgres:5432/omni_ad
      REDIS_URL: redis://redis:6379
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      META_CLIENT_ID: ${META_CLIENT_ID}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN}
      TIKTOK_APP_ID: ${TIKTOK_APP_ID}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
      LINE_YAHOO_CLIENT_ID: ${LINE_YAHOO_CLIENT_ID}
      LINE_YAHOO_CLIENT_SECRET: ${LINE_YAHOO_CLIENT_SECRET}
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
