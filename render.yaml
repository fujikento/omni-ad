## Render Blueprint — OMNI-AD Backend
## Deploy: https://dashboard.render.com/select-repo → select this repo → "Apply Blueprint"

databases:
  - name: omni-ad-db
    plan: starter
    databaseName: omni_ad
    user: omni_ad
    ipAllowList: []
    postgresMajorVersion: "16"

services:
  # --- API Server (Fastify + tRPC) ---
  - type: web
    name: omni-ad-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: omni-ad-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: omni-ad-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://omni-ad-deploy.vercel.app
      - key: FRONTEND_URL
        value: https://omni-ad-deploy.vercel.app
      - key: OAUTH_REDIRECT_BASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      # Platform credentials — add after creating developer accounts
      - key: META_CLIENT_ID
        sync: false
      - key: META_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: LINE_YAHOO_CLIENT_ID
        sync: false
      - key: LINE_YAHOO_CLIENT_SECRET
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # --- Worker (BullMQ job processor) ---
  - type: worker
    name: omni-ad-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: omni-ad-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: omni-ad-redis
          type: redis
          property: connectionString
      - key: TOKEN_ENCRYPTION_KEY
        fromService:
          name: omni-ad-api
          type: web
          envVarKey: TOKEN_ENCRYPTION_KEY
      - key: META_CLIENT_ID
        sync: false
      - key: META_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: LINE_YAHOO_CLIENT_ID
        sync: false
      - key: LINE_YAHOO_CLIENT_SECRET
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RUNWAY_API_KEY
        sync: false

  # --- Redis (for BullMQ job queue) ---
  - type: redis
    name: omni-ad-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
